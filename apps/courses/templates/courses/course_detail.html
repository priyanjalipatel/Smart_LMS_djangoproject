{% extends 'courses/base.html' %}
{% block content %}
<div class="card">
    {% if course.image %}
    <img src="{{ course.image.url }}" class="card-img-top">
    {% endif %}
    <div class="card-body">
        <h1>{{ course.title }}</h1>
        <p>{{ course.description }}</p>
        <p><strong>Instructor:</strong> {{ course.instructor }}</p>
        <p><strong>Created:</strong> {{ course.created_at }}</p>
    </div>
</div>
{% endblock %}
